<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Methods</title>

  <!-- Link external CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Internal CSS for p -->
  <style>
    p {
      background-color: lightgreen;
      color: white;
      font-size: 18px;
    }
  </style>

</head>
<body>

  <div>This is a div element</div>

  <p>This is a paragraph element</p>

  <button style="background-color: orange; font-size: 18px;">
    This is a button
  </button>

</body>
</html>
